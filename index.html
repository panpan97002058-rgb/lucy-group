<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --gray: #999999;
            --light-gray: #f2f2f2;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 20px;
            text-align: center;
            z-index: 1000;
            border-bottom: 1px solid var(--light-gray);
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        nav button {
            background: none;
            border: none;
            color: var(--gray);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            padding: 10px 15px;
            cursor: pointer;
            transition: color 0.3s;
            text-transform: uppercase;
        }

        nav button.active, nav button:hover {
            color: var(--text-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 15px;
            max-width: 2000px;
            margin: 0 auto;
        }

        .grid-item {
            background-color: var(--light-gray);
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .grid-item img.loaded {
            opacity: 1;
        }

        #sentinel {
            height: 100px;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Collection</h1>
    <nav id="filters">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="cat1">Category 01</button>
        <button class="filter-btn" data-cat="cat2">Category 02</button>
        <button class="filter-btn" data-cat="cat3">Category 03</button>
        <button class="filter-btn" data-cat="cat4">Category 04</button>
    </nav>
</header>

<main class="grid-container" id="gallery"></main>
<div id="sentinel"></div>

<script>
    const CONFIG = {
        categories: ['cat1', 'cat2', 'cat3', 'cat4'],
        itemsPerCat: 1000,
        batchSize: 30
    };

    let allData = [];
    let filteredData = [];
    let currentIndex = 0;

    function init() {
        CONFIG.categories.forEach(cat => {
            for (let i = 1; i <= CONFIG.itemsPerCat; i++) {
                allData.push({ cat: cat, url: `photos/${cat}/${i}.jpg` });
            }
        });
        filteredData = [...allData];
    }

    const gallery = document.getElementById('gallery');
    const sentinel = document.getElementById('sentinel');

    function render() {
        const nextBatch = filteredData.slice(currentIndex, currentIndex + CONFIG.batchSize);
        nextBatch.forEach(item => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            const img = document.createElement('img');
            img.dataset.src = item.url;
            img.src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            imgObserver.observe(img);
            div.appendChild(img);
            gallery.appendChild(div);
        });
        currentIndex += CONFIG.batchSize;
    }

    const imgObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                img.src = img.dataset.src;
                img.onload = () => img.classList.add('loaded');
                observer.unobserve(img);
            }
        });
    });

    const scrollObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && currentIndex < filteredData.length) {
            render();
        }
    }, { rootMargin: '200px' });

    document.getElementById('filters').addEventListener('click', (e) => {
        if (e.target.tagName !== 'BUTTON') return;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        const cat = e.target.dataset.cat;
        filteredData = cat === 'all' ? [...allData] : allData.filter(d => d.cat === cat);
        gallery.innerHTML = '';
        currentIndex = 0;
        render();
        window.scrollTo(0, 0);
    });

    init();
    render();
    scrollObserver.observe(sentinel);
</script>

</body>
</html>
