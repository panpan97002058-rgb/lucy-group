<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | Infinite Gallery</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --gray: #999999; --light: #f8f8f8; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); }

        /* Header */
        header { position: sticky; top: 0; background: rgba(255,255,255,0.98); padding: 40px 20px; text-align: center; z-index: 1000; border-bottom: 1px solid var(--light); }
        h1 { font-size: 1.2rem; font-weight: 400; letter-spacing: 0.4em; text-transform: uppercase; margin: 0 0 20px 0; }
        nav button { background: none; border: none; color: var(--gray); font-size: 0.7rem; letter-spacing: 0.2em; padding: 10px 15px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        nav button.active { color: var(--text); font-weight: bold; border-bottom: 1px solid #000; }

        /* Grid Layout */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; padding: 10px; max-width: 2400px; margin: 0 auto; }
        .grid-item { background: var(--light); aspect-ratio: 1/1; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.8s ease; }
        .grid-item img.loaded { opacity: 1; }

        /* Detail Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 60px 20px; }
        .modal-content { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 40px; }
        .modal-left { flex: 1.5; min-width: 300px; }
        .modal-left img { width: 100%; height: auto; }
        .modal-right { flex: 1; min-width: 300px; }
        .modal-right h2 { font-weight: 400; letter-spacing: 2px; margin-top: 0; border-bottom: 1px solid var(--light); padding-bottom: 20px; }
        .modal-right p { line-height: 2; color: #444; white-space: pre-line; }
        .close-btn { position: fixed; top: 20px; right: 20px; cursor: pointer; letter-spacing: 2px; border: 1px solid #000; padding: 8px 20px; font-size: 0.7rem; text-transform: uppercase; background: #fff; z-index: 10000; }

        /* Loading Trigger */
        #sentinel { height: 100px; width: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; letter-spacing: 2px; color: var(--gray); }
    </style>
</head>
<body>

<header>
    <h1>Archive</h1>
    <nav id="filters">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="cat1">Category 01</button>
        <button class="filter-btn" data-cat="cat2">Category 02</button>
        <button class="filter-btn" data-cat="cat3">Category 03</button>
        <button class="filter-btn" data-cat="cat4">Category 04</button>
    </nav>
</header>

<main class="grid-container" id="gallery"></main>

<div id="sentinel">LOADING...</div>

<div id="modal">
    <div class="close-btn" onclick="closeModal()">CLOSE</div>
    <div class="modal-content">
        <div class="modal-left"><img id="modal-img" src=""></div>
        <div class="modal-right">
            <h2 id="modal-title"></h2>
            <p id="modal-desc"></p>
        </div>
    </div>
</div>

<script>
    /* To handle 4000 images, you would fill this DATA array.
       The infinite scroll will automatically handle the loading chunks.
    */
    const DATA = [
        { cat: 'cat1', url: 'photos/cat1/1.jpg', title: 'Work 01', desc: 'Description text...' },
        { cat: 'cat2', url: 'photos/cat2/1.jpg', title: 'Work 02', desc: 'Description text...' },
        { cat: 'cat3', url: 'photos/cat3/1.jpg', title: 'Work 03', desc: 'Description text...' },
        { cat: 'cat4', url: 'photos/cat4/1.jpg', title: 'Work 04', desc: 'Description text...' },
        { cat: 'cat1', url: 'photos/cat1/2.jpg', title: 'Work 05', desc: 'Description text...' },
        { cat: 'cat2', url: 'photos/cat2/2.jpg', title: 'Work 06', desc: 'Description text...' },
        { cat: 'cat3', url: 'photos/cat3/2.jpg', title: 'Work 07', desc: 'Description text...' },
        { cat: 'cat4', url: 'photos/cat4/2.jpg', title: 'Work 08', desc: 'Description text...' }
        // Add all your items here...
    ];

    let filteredData = [...DATA];
    let currentIndex = 0;
    const batchSize = 12; // Loads 12 images at a time
    const gallery = document.getElementById('gallery');
    const sentinel = document.getElementById('sentinel');

    // Function to render images in batches
    function renderBatch() {
        const nextBatch = filteredData.slice(currentIndex, currentIndex + batchSize);
        if (nextBatch.length === 0) {
            sentinel.innerText = "END OF COLLECTION";
            return;
        }

        nextBatch.forEach(item => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.onclick = () => openModal(item);
            
            const img = document.createElement('img');
            img.dataset.src = item.url;
            img.src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            
            imgObserver.observe(img);
            div.appendChild(img);
            gallery.appendChild(div);
        });
        currentIndex += batchSize;
    }

    // Intersection Observer for Lazy Loading Images
    const imgObserver = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => {
            if(e.isIntersecting) {
                const img = e.target;
                img.src = img.dataset.src;
                img.onload = () => img.classList.add('loaded');
                obs.unobserve(img);
            }
        });
    }, { rootMargin: '50px' });

    // Intersection Observer for Infinite Scroll
    const scrollObserver = new IntersectionObserver(e => {
        if(e[0].isIntersecting && currentIndex < filteredData.length) {
            renderBatch();
        }
    }, { rootMargin: '300px' }); // Starts loading when user is 300px from bottom

    function openModal(item) {
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modal-img').src = item.url;
        document.getElementById('modal-title').innerText = item.title;
        document.getElementById('modal-desc').innerText = item.desc;
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // Filter Logic
    document.getElementById('filters').addEventListener('click', e => {
        if(e.target.tagName !== 'BUTTON') return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        
        const cat = e.target.dataset.cat;
        filteredData = (cat === 'all') ? [...DATA] : DATA.filter(d => d.cat === cat);
        
        gallery.innerHTML = '';
        currentIndex = 0;
        sentinel.innerText = "LOADING...";
        renderBatch();
        window.scrollTo(0, 0);
    });

    // Initialize
    renderBatch();
    scrollObserver.observe(sentinel);
</script>

</body>
</html>
