<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Archive | Collection</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --gray: #999999; --light: #f8f8f8; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Header & Navigation */
        header { position: sticky; top: 0; background: rgba(255,255,255,0.95); padding: 40px 20px; text-align: center; z-index: 1000; border-bottom: 1px solid var(--light); }
        h1 { font-size: 1.2rem; font-weight: 400; letter-spacing: 0.4em; text-transform: uppercase; margin: 0 0 20px 0; }
        nav button { background: none; border: none; color: var(--gray); font-size: 0.7rem; letter-spacing: 0.2em; padding: 10px 15px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        nav button.active, nav button:hover { color: var(--text); font-weight: bold; }

        /* Photo Grid */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; max-width: 2000px; margin: 0 auto; }
        .grid-item { background: var(--light); aspect-ratio: 1/1; overflow: hidden; cursor: pointer; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.6s ease, transform 0.6s ease; }
        .grid-item img.loaded { opacity: 1; }
        .grid-item:hover img { transform: scale(1.05); }

        /* Modal / Popup Detail View */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 80px 40px; }
        .modal-content { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 50px; align-items: flex-start; }
        .modal-left { flex: 1.2; min-width: 320px; }
        .modal-left img { width: 100%; height: auto; display: block; }
        .modal-right { flex: 0.8; min-width: 320px; }
        .modal-right h2 { font-weight: 400; font-size: 1.5rem; letter-spacing: 2px; margin: 0 0 20px 0; border-bottom: 1px solid var(--light); padding-bottom: 15px; }
        .modal-right p { line-height: 1.8; color: #333; font-size: 0.95rem; white-space: pre-line; }
        .close-btn { position: fixed; top: 30px; right: 30px; font-size: 0.75rem; cursor: pointer; letter-spacing: 3px; border: 1px solid #000; padding: 8px 20px; text-transform: uppercase; background: #fff; z-index: 10000; }
        .close-btn:hover { background: #000; color: #fff; }

        #sentinel { height: 100px; width: 100%; }
        
        @media (max-width: 768px) {
            .modal-content { flex-direction: column; }
            .modal-right { min-width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Collection</h1>
    <nav id="filters">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="cat1">Category 01</button>
        <button class="filter-btn" data-cat="cat2">Category 02</button>
    </nav>
</header>

<main class="grid-container" id="gallery"></main>
<div id="sentinel"></div>

<div id="modal">
    <div class="close-btn" onclick="closeModal()">Close</div>
    <div class="modal-content">
        <div class="modal-left">
            <img id="modal-img" src="" alt="Detail View">
        </div>
        <div class="modal-right">
            <h2 id="modal-title">Project Title</h2>
            <p id="modal-desc">Detailed information about this work.</p>
        </div>
    </div>
</div>

<script>
    /* --- DATABASE SECTION ---
       Add your images, titles, and descriptions here.
    */
    const DATA = [
        { 
            cat: 'cat1', 
            url: 'photos/cat1/1.jpg', 
            title: 'Sculpture Study 01', 
            desc: 'Material: Raw Steel\nDimensions: 120 x 80 cm\nCreated in 2024.' 
        },
        { 
            cat: 'cat1', 
            url: 'photos/cat1/2.jpg', 
            title: 'Minimalist Form', 
            desc: 'A study on negative space and linear composition.' 
        },
        { 
            cat: 'cat2', 
            url: 'photos/cat2/1.jpg', 
            title: 'Abstract Painting', 
            desc: 'Oil on canvas.\nPart of the "Untitled" series.' 
        }
        // Copy and paste the block above to add more images.
    ];

    let filteredData = [...DATA];
    let currentIndex = 0;
    const batchSize = 15;
    const gallery = document.getElementById('gallery');

    function render() {
        const nextBatch = filteredData.slice(currentIndex, currentIndex + batchSize);
        nextBatch.forEach(item => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.onclick = () => openModal(item);
            
            const img = document.createElement('img');
            img.dataset.src = item.url;
            img.src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            imgObserver.observe(img);
            
            div.appendChild(img);
            gallery.appendChild(div);
        });
        currentIndex += batchSize;
    }

    // Modal Interaction
    function openModal(item) {
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modal-img').src = item.url;
        document.getElementById('modal-title').innerText = item.title;
        document.getElementById('modal-desc').innerText = item.desc;
        document.body.style.overflow = 'hidden'; 
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // Image Lazy Loader
    const imgObserver = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => {
            if(e.isIntersecting) {
                const img = e.target;
                img.src = img.dataset.src;
                img.onload = () => img.classList.add('loaded');
                obs.unobserve(img);
            }
        });
    });

    // Infinite Scroll
    const scrollObserver = new IntersectionObserver(e => {
        if(e[0].isIntersecting && currentIndex < filteredData.length) {
            render();
        }
    }, { rootMargin: '200px' });
    scrollObserver.observe(document.getElementById('sentinel'));

    // Category Filtering
    document.getElementById('filters').addEventListener('click', e => {
        if(e.target.tagName !== 'BUTTON') return;
        
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        
        const cat = e.target.dataset.cat;
        filteredData = (cat === 'all') ? [...DATA] : DATA.filter(d => d.cat === cat);
        
        gallery.innerHTML = '';
        currentIndex = 0;
        render();
        window.scrollTo(0, 0);
    });

    // Initial Start
    render();
</script>

</body>
</html>
